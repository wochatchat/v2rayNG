name: Build Release APK (Fixed)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - uses: android-actions/setup-android@v3

      # ===== 关键修复：下载与代码版本匹配的 aar =====
      - name: Download compatible libv2ray.aar
        run: |
          # 先删除可能存在的旧文件
          mkdir -p V2rayNG/app/libs
          rm -f V2rayNG/app/libs/libv2ray.aar
          
          # 从原版 release 下载稳定版 aar（修改版本号为你需要的）
          wget --timeout=60 -O V2rayNG/app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/download/v25.1.1/libv2ray.aar \
            || wget --timeout=60 -O V2rayNG/app/libs/libv2ray.aar \
            https://github.com/2dust/v2rayNG/releases/download/1.9.9/libv2ray.aar
          
          echo "=== 验证 aar ==="
          ls -lh V2rayNG/app/libs/libv2ray.aar
          
          # 检查文件是否有效（aar 是 zip 格式）
          if ! unzip -t V2rayNG/app/libs/libv2ray.aar > /dev/null 2>&1; then
            echo "ERROR: aar 文件损坏或下载失败"
            exit 1
          fi
          
          echo "=== aar 内容预览 ==="
          unzip -l V2rayNG/app/libs/libv2ray.aar | grep -E "(AndroidManifest|classes|\.so)" | head -20

      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "android_keystore.jks"
          encodedString: ${{ secrets.KEYSTORE }}

      - name: Build Release APK
        run: |
          cd V2rayNG
          chmod +x gradlew
          ./gradlew licenseFdroidReleaseReport
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.android_keystore.outputs.filePath }} \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # ===== 关键验证：确认 so 文件在 APK 里 =====
      - name: Verify APK integrity
        run: |
          echo "=== 查找所有 APK ==="
          find V2rayNG/app/build/outputs/apk -name "*.apk" | sort
          
          echo "=== 检查每个 APK 的 so 文件 ==="
          for apk in $(find V2rayNG/app/build/outputs/apk -name "*.apk"); do
            echo "--- $apk ---"
            unzip -l "$apk" | grep "\.so" | head -10
          done

      - name: Organize APKs
        run: |
          mkdir -p apks/arm64-v8a apks/armeabi-v7a apks/x86_64 apks/x86
          VERSION="${{ github.event.inputs.release_tag }}"
          BUILD_TIME=$(date +"%Y%m%d")
          
          find V2rayNG/app/build/outputs/apk -name "*release*.apk" | while read apk; do
            if echo "$apk" | grep -q "arm64-v8a"; then ARCH="arm64-v8a"
            elif echo "$apk" | grep -q "armeabi-v7a"; then ARCH="armeabi-v7a"
            elif echo "$apk" | grep -q "x86_64"; then ARCH="x86_64"
            elif echo "$apk" | grep -q "x86"; then ARCH="x86"
            else ARCH="universal"
            fi
            cp "$apk" "apks/${ARCH}/v2rayNG_${VERSION}_${ARCH}_${BUILD_TIME}.apk"
          done

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-release-${{ github.event.inputs.release_tag }}
          path: apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: apks/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
