name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - uses: android-actions/setup-android@v3

      - name: Download libv2ray.aar
        uses: robinraju/release-downloader@v1
        with:
          repository: '2dust/AndroidLibXrayLite'
          latest: true
          fileName: 'libv2ray.aar'
          out-file-path: '${{ github.workspace }}/V2rayNG/app/libs/'

      - name: Build Debug APK
        run: |
          cd V2rayNG
          chmod +x gradlew
          ./gradlew clean assembleDebug

      # ===== 关键调试步骤：先看 APK 到底在哪 =====
      - name: Debug - Find all APK files
        run: |
          echo "=== 查找所有 APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "没有找到 APK"
          
          echo "=== build/outputs 完整结构 ==="
          find V2rayNG/app/build/outputs -type f 2>/dev/null || echo "目录不存在"

      - name: Organize APKs to root directory
        run: |
          mkdir -p apks/arm64-v8a apks/armeabi-v7a apks/x86_64 apks/x86 apks/universal
          
          # 获取元数据
          VERSION=$(grep -m1 "versionName" V2rayNG/app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ' || echo "unknown")
          BUILD_TIME=$(date +"%Y%m%d_%H%M%S")
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          echo "Version: $VERSION, Time: $BUILD_TIME, SHA: $SHORT_SHA"
          
          # 递归查找所有 APK
          APK_COUNT=0
          find V2rayNG/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | while read apk; do
            APK_COUNT=$((APK_COUNT + 1))
            
            # 从路径判断架构
            if echo "$apk" | grep -q "arm64-v8a"; then
              ARCH="arm64-v8a"
            elif echo "$apk" | grep -q "armeabi-v7a"; then
              ARCH="armeabi-v7a"
            elif echo "$apk" | grep -q "x86_64"; then
              ARCH="x86_64"
            elif echo "$apk" | grep -q "x86"; then
              ARCH="x86"
            else
              ARCH="universal"
            fi
            
            NEW_NAME="v2rayNG_v${VERSION}_${ARCH}_${BUILD_TIME}_${SHORT_SHA}.apk"
            cp "$apk" "apks/${ARCH}/${NEW_NAME}"
            echo "[$APK_COUNT] $apk -> apks/${ARCH}/${NEW_NAME}"
          done
          
          echo "=== 最终文件 ==="
          find apks -type f | sort || echo "apks 目录为空！"

      - name: Upload organized APKs
        uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-apks
          path: apks/
          retention-days: 30
