name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - uses: android-actions/setup-android@v3

      - name: Download latest libv2ray.aar
        run: |
          mkdir -p V2rayNG/app/libs
          rm -f V2rayNG/app/libs/libv2ray.aar
          
          wget --timeout=60 -O V2rayNG/app/libs/libv2ray.aar \
            "https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar" \
            2>/dev/null || true
          
          if [ ! -s V2rayNG/app/libs/libv2ray.aar ]; then
            wget --timeout=60 -O V2rayNG/app/libs/libv2ray.aar \
              "https://github.com/2dust/v2rayNG/releases/latest/download/libv2ray.aar" \
              2>/dev/null || true
          fi
          
          ls -lh V2rayNG/app/libs/libv2ray.aar
          
          if [ ! -f V2rayNG/app/libs/libv2ray.aar ] || [ ! -s V2rayNG/app/libs/libv2ray.aar ]; then
            echo "ERROR: libv2ray.aar 下载失败"
            exit 1
          fi

      - name: Build Debug APK
        run: |
          cd V2rayNG
          chmod +x gradlew
          ./gradlew clean assembleDebug

      # ===== 直接复制到仓库根目录 apks/ =====
      - name: Copy APKs to root directory
        run: |
          # 在仓库根目录创建 apks 文件夹
          mkdir -p ${{ github.workspace }}/apks/arm64-v8a
          mkdir -p ${{ github.workspace }}/apks/universal
          
          VERSION=$(grep -m1 "versionName" V2rayNG/app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ' || echo "unknown")
          BUILD_TIME=$(date +"%Y%m%d_%H%M%S")
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          echo "Version: $VERSION"
          echo "Build: $BUILD_TIME"
          echo "Commit: $SHORT_SHA"
          
          # 从整个项目搜索 APK 并复制到根目录
          find . -name "*.apk" -type f | while read apk; do
            echo "发现: $apk"
            
            # 判断架构
            if echo "$apk" | grep -q "arm64-v8a"; then
              ARCH="arm64-v8a"
            elif echo "$apk" | grep -q "universal"; then
              ARCH="universal"
            else
              # 根据文件名判断
              if echo "$(basename $apk)" | grep -q "arm64"; then
                ARCH="arm64-v8a"
              else
                ARCH="universal"
              fi
            fi
            
            NEW_NAME="v2rayNG_v${VERSION}_${ARCH}_debug_${BUILD_TIME}_${SHORT_SHA}.apk"
            cp "$apk" "${{ github.workspace }}/apks/${ARCH}/${NEW_NAME}"
            echo "已复制到: apks/${ARCH}/${NEW_NAME}"
          done
          
          echo "=== 最终结构 ==="
          find ${{ github.workspace }}/apks -type f | sort
          
          # 检查是否为空
          if [ -z "$(find ${{ github.workspace }}/apks -type f)" ]; then
            echo "ERROR: 没有找到任何 APK！"
            exit 1
          fi

      # ===== 从根目录上传 Artifact =====
      - name: Upload APKs from root
        uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-debug-apks
          path: ${{ github.workspace }}/apks/
          retention-days: 30
