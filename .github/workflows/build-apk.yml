name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - uses: android-actions/setup-android@v3

      # ===== 关键修复：下载与代码版本匹配的 aar =====
      - name: Download compatible libv2ray.aar
        run: |
          mkdir -p V2rayNG/app/libs
          rm -f V2rayNG/app/libs/libv2ray.aar
          
          # 尝试从 AndroidLibXrayLite 下载
          wget --timeout=60 -O V2rayNG/app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/download/v25.1.1/libv2ray.aar \
            2>/dev/null || true
          
          # 如果失败，从原版 v2rayNG release 提取（备用）
          if [ ! -s V2rayNG/app/libs/libv2ray.aar ]; then
            echo "从 AndroidLibXrayLite 下载失败，尝试备用方案..."
            wget --timeout=60 -O /tmp/v2rayng_official.apk \
              https://github.com/2dust/v2rayNG/releases/download/1.9.9/v2rayNG_1.9.9_arm64-v8a.apk \
              2>/dev/null || true
            
            # 从官方 APK 提取 aar 里的 so 文件（临时方案）
            if [ -f /tmp/v2rayng_official.apk ]; then
              mkdir -p /tmp/extract
              unzip -o /tmp/v2rayng_official.apk -d /tmp/extract/
              # 这里只是验证 so 存在，aar 还是需要正确来源
            fi
          fi
          
          # 最终检查
          echo "=== aar 文件信息 ==="
          ls -lh V2rayNG/app/libs/libv2ray.aar 2>/dev/null || echo "文件不存在！"
          
          if [ -f V2rayNG/app/libs/libv2ray.aar ] && [ -s V2rayNG/app/libs/libv2ray.aar ]; then
            echo "=== 验证 aar 内容 ==="
            unzip -l V2rayNG/app/libs/libv2ray.aar | grep -E "(\.so|classes|AndroidManifest)" | head -20
          else
            echo "ERROR: libv2ray.aar 下载失败或为空"
            exit 1
          fi

      # ===== Debug 构建（自动使用 debug.keystore）=====
      - name: Build Debug APK
        run: |
          cd V2rayNG
          chmod +x gradlew
          ./gradlew clean assembleDebug

      # ===== 验证 APK 完整性 =====
      - name: Verify APK integrity
        run: |
          echo "=== 所有生成的 APK ==="
          find V2rayNG/app/build/outputs/apk -name "*.apk" | sort
          
          echo ""
          echo "=== 检查每个 APK 的 native 库 ==="
          for apk in $(find V2rayNG/app/build/outputs/apk -name "*.apk"); do
            echo "--- $(basename $apk) ---"
            unzip -l "$apk" | grep "lib/" | head -10
            echo ""
          done

      # ===== 整理到根目录 apks/ =====
      - name: Organize APKs
        run: |
          mkdir -p apks/arm64-v8a apks/armeabi-v7a apks/x86_64 apks/x86 apks/universal
          
          VERSION=$(grep -m1 "versionName" V2rayNG/app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ' || echo "unknown")
          BUILD_TIME=$(date +"%Y%m%d_%H%M%S")
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          echo "Version: $VERSION"
          echo "Build: $BUILD_TIME"
          echo "Commit: $SHORT_SHA"
          
          find V2rayNG/app/build/outputs/apk -name "*debug*.apk" -o -name "*.apk" | while read apk; do
            # 从路径判断架构
            if echo "$apk" | grep -q "arm64-v8a"; then ARCH="arm64-v8a"
            elif echo "$apk" | grep -q "armeabi-v7a"; then ARCH="armeabi-v7a"
            elif echo "$apk" | grep -q "x86_64"; then ARCH="x86_64"
            elif echo "$apk" | grep -q "x86"; then ARCH="x86"
            else ARCH="universal"
            fi
            
            NEW_NAME="v2rayNG_v${VERSION}_${ARCH}_debug_${BUILD_TIME}_${SHORT_SHA}.apk"
            cp "$apk" "apks/${ARCH}/${NEW_NAME}"
            echo "-> apks/${ARCH}/${NEW_NAME}"
          done
          
          echo "=== 最终结构 ==="
          find apks -type f | sort

      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-debug-apks
          path: apks/
          retention-days: 30
