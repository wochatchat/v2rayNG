name: Build Release APK

on:
  # 手动触发，可输入版本号
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
  
  # 或者推送到 main 分支时自动构建（可选）
  # push:
  #   branches: [main, master]
  #   paths:
  #     - 'V2rayNG/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境（v2rayNG 需要 Java 21）
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. 设置 Android SDK
      - name: Setup Android environment
        uses: android-actions/setup-android@v3

      # 4. 下载最新的 libv2ray.aar（从 2dust/AndroidLibXrayLite）
      - name: Download latest libv2ray.aar
        uses: robinraju/release-downloader@v1
        with:
          repository: '2dust/AndroidLibXrayLite'
          latest: true
          fileName: 'libv2ray.aar'
          out-file-path: '${{ github.workspace }}/V2rayNG/app/libs/'

      # 5. 解码签名密钥（从 GitHub Secrets）
      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1
        id: android_keystore
        with:
          fileName: "android_keystore.jks"
          encodedString: ${{ secrets.KEYSTORE }}

      # 6. 构建并签名 APK
      - name: Build Signed APK
        run: |
          cd ${{ github.workspace }}/V2rayNG
          chmod +x gradlew
          ./gradlew licenseFdroidReleaseReport
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.android_keystore.outputs.filePath }} \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 7. 上传各架构 APK 作为构建产物
      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: arm64-v8a
          path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*arm64-v8a*.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: armeabi-v7a
          path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*armeabi-v7a*.apk

      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: x86-apk
          path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*x86*.apk

      # 8. 发布到 GitHub Releases（可选）
      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        if: github.event.inputs.release_tag != ''
        with:
          file: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*.apk
          tag: ${{ github.event.inputs.release_tag }}
          file_glob: true
          prerelease: false
