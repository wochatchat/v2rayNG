name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - uses: android-actions/setup-android@v3

      - name: Download latest libv2ray.aar
        run: |
          mkdir -p V2rayNG/app/libs
          rm -f V2rayNG/app/libs/libv2ray.aar
          
          wget --timeout=60 -O V2rayNG/app/libs/libv2ray.aar \
            "https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar" \
            2>/dev/null || true
          
          if [ ! -s V2rayNG/app/libs/libv2ray.aar ]; then
            wget --timeout=60 -O V2rayNG/app/libs/libv2ray.aar \
              "https://github.com/2dust/v2rayNG/releases/latest/download/libv2ray.aar" \
              2>/dev/null || true
          fi
          
          ls -lh V2rayNG/app/libs/libv2ray.aar
          
          if [ ! -f V2rayNG/app/libs/libv2ray.aar ] || [ ! -s V2rayNG/app/libs/libv2ray.aar ]; then
            echo "ERROR: libv2ray.aar 下载失败"
            exit 1
          fi

      # ===== 关键修改：只构建 arm64-v8a 和 universal =====
      - name: Build Debug APK (arm64-v8a + universal)
        run: |
          cd V2rayNG
          chmod +x gradlew
          ./gradlew clean assembleDebug \
            -Pandroid.injected.build.abi=arm64-v8a \
            -Pandroid.injected.build.abi=universal \
            || ./gradlew clean assembleArm64_v8aDebug assembleUniversalDebug

      - name: Verify APK
        run: |
          echo "=== 所有生成的 APK ==="
          find V2rayNG/app/build/outputs/apk -name "*.apk" | sort
          
          echo "=== native 库检查 ==="
          for apk in $(find V2rayNG/app/build/outputs/apk -name "*.apk"); do
            echo "--- $(basename $apk) ---"
            unzip -l "$apk" | grep "lib/" | head -10
          done

      # ===== 只整理 arm64-v8a 和 universal =====
      - name: Organize APKs
        run: |
          mkdir -p apks/arm64-v8a apks/universal
          
          VERSION=$(grep -m1 "versionName" V2rayNG/app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ' || echo "unknown")
          BUILD_TIME=$(date +"%Y%m%d_%H%M%S")
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          find V2rayNG/app/build/outputs/apk -name "*.apk" | while read apk; do
            if echo "$apk" | grep -q "arm64-v8a"; then
              ARCH="arm64-v8a"
            elif echo "$apk" | grep -q "universal"; then
              ARCH="universal"
            else
              # 跳过其他架构
              echo "跳过: $(basename $apk)"
              continue
            fi
            
            NEW_NAME="v2rayNG_v${VERSION}_${ARCH}_debug_${BUILD_TIME}_${SHORT_SHA}.apk"
            cp "$apk" "apks/${ARCH}/${NEW_NAME}"
            echo "-> apks/${ARCH}/${NEW_NAME}"
          done
          
          echo "=== 最终结构 ==="
          find apks -type f | sort

      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-debug-apks
          path: apks/
          retention-days: 30
